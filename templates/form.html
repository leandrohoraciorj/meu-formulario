<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Marque sua presença</title>

<style>
body {
    background: linear-gradient(135deg, #0f1b2d, #1e3c72);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Caixa principal */
.container {
    background: #1e2a3a;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    color: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Título */
h1 {
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #eee;
}

/* Radio */
.radio-group {
    text-align: left;
    margin-top: 10px;
    font-size: 14px;
}

/* Botão */
button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(45deg, #2ecc71, #27ae60);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Mensagem */
.success {
    display: none;
    font-size: 18px;
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGO (troca pelo seu link) -->
    <img src="https://via.placeholder.com/80" class="logo">

    <h1>🔥 MARQUE SUA PRESENÇA</h1>

    <form id="form">

        <input type="text" placeholder="Nome completo" required>
        <input type="text" placeholder="(00) 00000-0000" required>
        <input type="text" placeholder="Cidade" required>
        <input type="text" placeholder="Bairro" required>

        <div class="radio-group">
            <p>Quer fazer parte do grupo oficial?</p>
            <label><input type="radio" name="grupo" required> Sim</label><br>
            <label><input type="radio" name="grupo"> Não</label>
        </div>

        <button type="submit">CONFIRMAR PRESENÇA</button>

    </form>

    <div class="success" id="msg">
        🎉 Presença confirmada com sucesso! 🎉
    </div>

</div>

<!-- Fogos -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("msg").style.display = "block";

    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });
});
</script>

</body>
</html>
