<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Marque sua presença</title>

<style>
body {
    background: linear-gradient(135deg, #0f1b2d, #1e3c72);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    background: #1e2a3a;
    padding: 30px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    color: white;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Título */
h1 {
    font-size: 22px;
    font-weight: bold;
    text-transform: uppercase;
    margin-bottom: 20px;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #eee;
    text-transform: uppercase;
}

/* Radio */
.radio-group {
    text-align: left;
    margin-top: 15px;
}

.radio-group p {
    margin-bottom: 10px;
    font-weight: bold;
}

.radio-option {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
}

.radio-option input {
    transform: scale(1.2);
}

/* Botão */
button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(45deg, #2ecc71, #27ae60);
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Loading */
.loading {
    display: none;
    margin-top: 15px;
}

.spinner {
    width: 30px;
    height: 30px;
    border: 4px solid #fff;
    border-top: 4px solid #2ecc71;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Mensagem */
.success {
    display: none;
    font-size: 18px;
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>
<body>

<div class="container">

    <!-- LOGO -->
    <img src="https://via.placeholder.com/80" class="logo">

    <h1>🔥 MARQUE SUA PRESENÇA</h1>

    <form id="form">

        <input type="text" placeholder="Nome completo" required>
        <input type="text" placeholder="(00) 00000-0000" required>
        <input type="text" placeholder="Cidade" required>
        <input type="text" placeholder="Bairro" required>

        <div class="radio-group">
            <p>QUER FAZER PARTE DO GRUPO OFICIAL?</p>

            <div class="radio-option">
                <input type="radio" name="grupo" value="SIM" required>
                <label>SIM</label>
            </div>

            <div class="radio-option">
                <input type="radio" name="grupo" value="NAO">
                <label>NÃO</label>
            </div>
        </div>

        <button type="submit" id="btn">CONFIRMAR PRESENÇA</button>

    </form>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>ENVIANDO...</p>
    </div>

    <!-- Mensagem -->
    <div class="success" id="msg">
        🎉 PRESENÇA CONFIRMADA COM SUCESSO! 🎉
    </div>

</div>

<!-- Fogos -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// MAIÚSCULO AUTOMÁTICO
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", function() {
        this.value = this.value.toUpperCase();
    });
});

// SUBMIT COM LOADING + ANIMAÇÃO
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("btn").style.display = "none";
    document.getElementById("loading").style.display = "block";

    setTimeout(() => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("msg").style.display = "block";

        confetti({
            particleCount: 200,
            spread: 120,
            origin: { y: 0.6 }
        });

    }, 2000);
});
</script>

</body>
</html>
