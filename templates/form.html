<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<style>
body {
    background: #0f1b2d;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #1e2a3a;
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    color: white;
}

h1 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
    background: #eee;
}

button {
    width: 100%;
    padding: 15px;
    background: #2ecc71;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

.radio-group {
    text-align: left;
    margin-top: 10px;
}

.success {
    display: none;
    font-size: 18px;
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>
<body>

<div class="container">

    <h1>Marque sua presença</h1>

    <form id="form">

        <input type="text" placeholder="Nome completo" required>
        <input type="text" placeholder="(00) 00000-0000" required>
        <input type="text" placeholder="Cidade" required>
        <input type="text" placeholder="Bairro" required>

        <div class="radio-group">
            <p>Quer fazer parte do grupo oficial?</p>
            <label><input type="radio" name="grupo" required> Sim</label><br>
            <label><input type="radio" name="grupo"> Não</label>
        </div>

        <button type="submit">CADASTRAR</button>

    </form>

    <div class="success" id="msg">
        🎉 Cadastro realizado com sucesso! 🎉
    </div>

</div>

<!-- Biblioteca de fogos -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
document.getElementById("form").addEventListener("submit", function(e) {
    e.preventDefault();

    document.getElementById("msg").style.display = "block";

    // Fogos 🎆
    confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
    });
});
</script>

</body>
</html>
